<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container">

        <div class="left">
            <p>
                "Educação não é o aprendizado de fatos, mas o treinamento da mente para pensar."
            </p>
            <span>ALBERT EINSTEIN</span>
        </div>

        <div class="right">

            <h1>Cadastre-se</h1>

            <p>
                Passo 2 de 2.<br>
                Por favor, insira seus dados para finalizar para prosseguir
            </p>

            <form>

                <p><label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Nome completo">
                </p>

                <p><label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="(99) 99999-9999">
                </p>

                <p><label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="user@email.com">
                </p>

                <p><label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="********">
                </p>

                <p><button type="submit">Cadastrar</button></p>

            </form>
            <a href="login.html">Voltar para login</a>

        </div>

    </div>
</body>

</html>
